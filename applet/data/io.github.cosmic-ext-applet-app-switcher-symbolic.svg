<svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 16 16">
  <!-- switcher strip background -->
  <rect x="1" y="4" width="14" height="8" rx="2" fill="currentColor" opacity="0.2"/>
  <!-- left app (unselected) -->
  <rect x="2" y="6" width="3.5" height="4" rx="0.75" fill="currentColor" opacity="0.55"/>
  <!-- centre app (selected — slightly taller) -->
  <rect x="6.25" y="5.5" width="3.5" height="5" rx="0.75" fill="currentColor"/>
  <!-- right app (unselected) -->
  <rect x="10.5" y="6" width="3.5" height="4" rx="0.75" fill="currentColor" opacity="0.55"/>
</svg>
